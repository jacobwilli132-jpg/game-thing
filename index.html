<!DOCTYPE html>
<html lang="en">
<style>
  body {
    display: flex;
    justify-content: center; /* Horizontal centering */
    align-items: center;     /* Vertical centering */
    min-height: 100vh;
    margin: 0;
  }
  button {
    margin: 2px;
  }
</style>
<body>
    <script>
// 1. Define your array of objects
const games = [
    {
        name: "Clicker Game",
        link: "https://raw.githubusercontent.com/jacobwilli132-jpg/game-thing/refs/heads/main/Clicker.html" },
    {
        name: "Dave and bambi",
        link: "https://raw.githubusercontent.com/jacobwilli132-jpg/game-thing/refs/heads/main/Friday%20Night%20Funkin%20Vs.%20Dave%20and%20Bambi%20v3.html"
        
    }
];

// 2. Iterate and create elements
games.forEach(game => {
    // Create the button
    const button = document.createElement('button');
    
    // Set properties from the object
    button.innerText = game.name;
    
    // Add the click event
    button.addEventListener('click', () => {
        fetch(game.link)
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.text();
            })
            .then(html => {
                document.querySelectorAll('button').forEach(button => button.remove());
                document.querySelectorAll("style, link[rel='stylesheet']").forEach(el => el.remove());
                document.write(html);
            })
            .catch(error => {
                console.error("Error loading HTML:", error);
                document.getElementById("gameContent").innerText = "Failed to load content.";
            });
    });

    // 4. Append to the page
    document.body.appendChild(button);
});
    </script>
</body>
</html>
